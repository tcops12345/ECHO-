<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation ECHO — Case #078</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080C15;--panel:#0F1520;--card:#141928;--card2:#1C2538;--border:#1E2A40;
  --red:#CC1F1F;--rb:#FF4444;--orange:#E07820;--yellow:#C9981A;
  --green:#2EA043;--blue:#4A80C4;--white:#FFF;
  --text:#B0B8C8;--tl:#D8DDE8;--td:#506070;
  --mono:'Courier New',monospace;--body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);font-size:14px;line-height:1.5;overflow:hidden}
.app{display:grid;grid-template-rows:54px 1fr;grid-template-columns:210px 340px 1fr;height:100vh}
/* HEADER */
.hdr{grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px}
.hdr-badge{font-family:var(--mono);font-size:8px;color:var(--red);letter-spacing:3px;border:1px solid var(--red);padding:3px 7px;flex-shrink:0}
.hdr-title{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--white);letter-spacing:4px}
.hdr-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:8px;color:var(--red);letter-spacing:2px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.hdr-case{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--td);letter-spacing:2px;white-space:nowrap}
/* NAV */
.nav{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;grid-row:2}
.nav-lbl{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--td);padding:10px 14px 4px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:background .12s;user-select:none}
.ni:hover{background:var(--card)}
.ni.active{background:rgba(204,31,31,.12);border-left-color:var(--red)}
.ni.active .ni-title{color:var(--white)}
.ni.active .ni-icon{color:var(--red)}
.ni-icon{font-size:10px;color:var(--td);width:14px;text-align:center;flex-shrink:0}
.ni-title{font-size:12px;color:var(--text);font-weight:500}
.ni-count{margin-left:auto;font-family:var(--mono);font-size:8px;color:var(--td);background:var(--card);padding:1px 5px;border-radius:2px}
/* ITEM LIST */
.list-panel{border-right:1px solid var(--border);overflow-y:auto;background:var(--bg);grid-row:2}
.list-hdr{padding:14px 14px 10px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:10}
.list-hdr-title{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--white);text-transform:uppercase;margin-bottom:3px}
.list-hdr-sub{font-size:10px;color:var(--td)}
.ic{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.ic:hover{background:var(--card)}
.ic.active{background:var(--card2);border-left-color:var(--red)}
.ic-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:3px}
.ic-name{font-size:12.5px;font-weight:600;color:var(--tl);line-height:1.3}
.ic-desc{font-size:10.5px;color:var(--td);line-height:1.4}
.ic-meta{font-family:var(--mono);font-size:9px;color:var(--td);margin-top:5px}
/* TAGS */
.tag{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;padding:2px 5px;border-radius:2px;text-transform:uppercase;flex-shrink:0;margin-top:2px;white-space:nowrap}
.t-red{background:rgba(204,31,31,.2);color:var(--rb)}
.t-orange{background:rgba(224,120,32,.2);color:var(--orange)}
.t-yellow{background:rgba(201,152,26,.2);color:var(--yellow)}
.t-green{background:rgba(46,160,67,.2);color:var(--green)}
.t-blue{background:rgba(74,128,196,.2);color:var(--blue)}
.t-gray{background:rgba(80,96,112,.2);color:var(--td)}
/* EVIDENCE PANEL */
.ev-panel{overflow-y:auto;background:var(--bg);grid-row:2}
.ev-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px}
.ev-empty-icon{font-size:28px;color:var(--td);opacity:.3}
.ev-empty-txt{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--td);opacity:.35;text-transform:uppercase}
.ev-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:10}
.ev-eyebrow{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--td);text-transform:uppercase;margin-bottom:5px}
.ev-title{font-size:17px;font-weight:700;color:var(--white);line-height:1.3}
.ev-summary{font-size:12px;color:var(--text);margin-top:7px;line-height:1.6}
.ev-body{padding:18px 22px}
.ev-sec-lbl{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--red);text-transform:uppercase;margin-bottom:10px}
.ev-item{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:13px 15px;margin-bottom:9px}
.ev-item-lbl{font-size:12px;font-weight:700;color:var(--tl);margin-bottom:5px}
.ev-item-detail{font-size:11.5px;color:var(--text);line-height:1.65}
.ev-item-src{margin-top:9px;padding-top:8px;border-top:1px solid var(--border);font-family:var(--mono);font-size:8px;color:var(--td);line-height:1.5}
.ev-item-src::before{content:'SOURCE: ';color:var(--red)}
@keyframes reveal{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ev-item{animation:reveal .2s ease both}
.ev-item:nth-child(2){animation-delay:.05s}
.ev-item:nth-child(3){animation-delay:.1s}
.ev-item:nth-child(4){animation-delay:.15s}
.ev-item:nth-child(5){animation-delay:.2s}
.ev-item:nth-child(6){animation-delay:.25s}
.ev-item:nth-child(7){animation-delay:.3s}
.ev-item:nth-child(8){animation-delay:.35s}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:800px){
  .app{grid-template-rows:54px 48px auto auto;grid-template-columns:1fr;height:auto;overflow:auto}
  html,body{overflow:auto}
  .nav{display:flex;overflow-x:auto;overflow-y:hidden;padding:0;border-right:none;border-bottom:1px solid var(--border);grid-row:2;grid-column:1}
  .nav-lbl,.ni-count,.ni-icon{display:none}
  .ni{flex-shrink:0;padding:0 14px;height:48px;border-left:none;border-bottom:2px solid transparent;border-top:none}
  .ni.active{background:transparent;border-bottom-color:var(--red)}
  .ni-title{font-size:11px;white-space:nowrap}
  .list-panel{grid-row:3;grid-column:1;border-right:none;border-bottom:1px solid var(--border);max-height:50vh}
  .ev-panel{grid-row:4;grid-column:1;min-height:60vh}
}
</style>
</head>

let activeSec = 0, activeItem = null;

function renderNav(){
  document.getElementById('nav').innerHTML =
    '<div class="nav-lbl">Sections</div>' +
    DATA.map((s,i) =>
      `<div class="ni${i===activeSec?' active':''}" onclick="selSec(${i})">` +
      `<span class="ni-icon">${s.icon}</span>` +
      `<span class="ni-title">${s.title}</span>` +
      `<span class="ni-count">${s.items.length}</span></div>`
    ).join('');
}

function renderList(){
  const s = DATA[activeSec];
  document.getElementById('listPanel').innerHTML =
    `<div class="list-hdr"><div class="list-hdr-title">${s.title}</div><div class="list-hdr-sub">${s.desc}</div></div>` +
    s.items.map((item,i) =>
      `<div class="ic${activeItem===i?' active':''}" onclick="selItem(${i})">` +
      `<div class="ic-row"><span class="tag ${item.tc}">${item.tag}</span><span class="ic-name">${item.name}</span></div>` +
      `<div class="ic-desc">${item.desc}</div>` +
      `<div class="ic-meta">${item.evidence.length} evidence point${item.evidence.length!==1?'s':''}</div></div>`
    ).join('');
}

function renderEvidence(){
  const el = document.getElementById('evPanel');
  if(activeItem===null){
    el.innerHTML='<div class="ev-empty"><div class="ev-empty-icon">◎</div><div class="ev-empty-txt">Select an item to view evidence</div></div>';
    return;
  }
  const item = DATA[activeSec].items[activeItem];
  const evHtml = item.evidence.map(e =>
    `<div class="ev-item"><div class="ev-item-lbl">${e.lbl}</div>` +
    `<div class="ev-item-detail">${e.detail}</div>` +
    `<div class="ev-item-src">${e.src}</div></div>`
  ).join('');
  el.innerHTML =
    `<div class="ev-hdr"><div class="ev-eyebrow">Evidence — ${DATA[activeSec].title}</div>` +
    `<div class="ev-title">${item.name}</div>` +
    `<div class="ev-summary">${item.summary}</div></div>` +
    `<div class="ev-body"><div class="ev-sec-lbl">Supporting Evidence (${item.evidence.length} point${item.evidence.length!==1?'s':''})</div>${evHtml}</div>`;
}

function selSec(i){activeSec=i;activeItem=null;renderNav();renderList();renderEvidence();}
function selItem(i){
  activeItem=i;renderList();renderEvidence();
  if(window.innerWidth<=800) document.getElementById('evPanel').scrollIntoView({behavior:'smooth'});
}

renderNav();renderList();renderEvidence();
</script>
